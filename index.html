<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f1a;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  width: 360px;
  padding: 30px;
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  backdrop-filter: blur(12px);
  box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}

h1 {
  margin: 0;
  font-size: 26px;
}

p {
  opacity: 0.7;
  margin-top: 5px;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
  border: none;
  outline: none;
  background: #1b1b2a;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(90deg, #ff4d8d, #6c63ff);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}
</style>
</head>

<body>

<div class="box">
  <h1 id="title"></h1>
  <p id="subtitle"></p>

  <input type="text" placeholder="Email или логин" />
  <input type="password" placeholder="Пароль" />

  <button>Войти</button>
</div>

<script>
const isReturning = localStorage.getItem("visited");

const title = document.getElementById("title");
const subtitle = document.getElementById("subtitle");

if (!isReturning) {
  title.textContent = "Рада видеть тебя здесь";
  subtitle.textContent = "Начни свою историю";

  localStorage.setItem("visited", "true");
} else {
  title.textContent = "С возвращением";
  subtitle.textContent = "Твоя история продолжается";
}
</script>

</body>
</html>
