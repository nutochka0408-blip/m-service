<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #222;
      padding: 20px;
      border-radius: 10px;
      width: 280px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #4CAF50;
      border: none;
      color: white;
    }
  </style>
</head>

<body>
  <div class="box">
    <h2>Вход</h2>
    <input placeholder="Email" />
    <input type="password" placeholder="Пароль" />
    <button>Войти</button>
  </div>
</body>
</html>
